name: Build Windows EXE

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "false"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  SCCACHE_CACHE_SIZE: "2G"

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: apps/tuffbox-desktop/package-lock.json

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Remove local cargo config (CI uses default linker)
      run: Remove-Item -Force .cargo/config.toml -ErrorAction SilentlyContinue

    - name: Run sccache
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-reg-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-reg-

    - name: Cache sccache store
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.sccache
        key: ${{ runner.os }}-sccache-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-sccache-

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('bridges/jei-runtime/**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install frontend dependencies
      working-directory: apps/tuffbox-desktop
      run: npm ci

    - name: Build JEI runtime bridges
      working-directory: bridges/jei-runtime
      run: .\gradlew.bat syncDesktopResources --no-daemon

    - name: Build Tauri (Windows .exe)
      working-directory: apps/tuffbox-desktop
      run: npx tauri build --no-bundle 2>&1 | Tee-Object -FilePath $env:GITHUB_WORKSPACE/tauri-build.log

    - name: Dump target tree on failure
      if: failure()
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -File target -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match '\.(exe|msi|dll)$' } |
          Select-Object FullName, Length | Format-Table -AutoSize
        if (Test-Path $env:GITHUB_WORKSPACE/tauri-build.log) {
          Write-Host "===== tauri-build.log (tail) ====="
          Get-Content $env:GITHUB_WORKSPACE/tauri-build.log -Tail 80
        }

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tuffbox-build-log
        path: tauri-build.log
        if-no-files-found: ignore

    - name: Locate build output
      shell: pwsh
      run: |
        $candidates = @(
          "target/release/tuffbox-desktop.exe",
          "target/x86_64-pc-windows-msvc/release/tuffbox-desktop.exe",
          "target/debug/tuffbox-desktop.exe",
          "target/x86_64-pc-windows-msvc/debug/tuffbox-desktop.exe"
        )
        $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
        if (-not $exe) {
          Write-Error "tuffbox-desktop.exe not found in any expected target dir"
          exit 1
        }
        Write-Host "Found exe at: $exe"
        "EXE_PATH=$exe" | Out-File -Append -FilePath $env:GITHUB_ENV

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tuffbox-desktop-windows
        path: |
          ${{ env.EXE_PATH }}
        if-no-files-found: warn
