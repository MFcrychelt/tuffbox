name: Build Windows EXE

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: apps/tuffbox-desktop/package-lock.json

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Remove local cargo config (CI uses default linker)
      run: Remove-Item -Force .cargo/config.toml -ErrorAction SilentlyContinue

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install frontend dependencies
      working-directory: apps/tuffbox-desktop
      run: npm ci

    - name: Build JEI runtime bridges
      working-directory: bridges/jei-runtime
      run: .\gradlew.bat syncDesktopResources --no-daemon

    - name: Build Tauri (Windows .exe + installer)
      working-directory: apps/tuffbox-desktop
      run: npm run tauri:build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tuffbox-desktop-windows
        path: |
          target/release/tuffbox-desktop.exe
          target/release/bundle/
        if-no-files-found: error
