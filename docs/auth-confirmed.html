<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TuffBox — email confirmed</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #12141a;
        --text: #e8eaef;
        --muted: #9aa3b2;
        --accent: #e07a3a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(1200px 600px at 20% 0%, #2a1c14 0%, var(--bg) 55%);
        color: var(--text);
      }
      main {
        max-width: 28rem;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 650;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 0.75rem;
        line-height: 1.5;
        color: var(--muted);
      }
      .brand {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">TuffBox</p>
      <h1>Email confirmed</h1>
      <p>
        Your Crash Votes account is ready. Return to the TuffBox desktop app and
        sign in with the same email and password.
      </p>
      <p>You can close this browser tab.</p>
    </main>
  </body>
</html>
